<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#642a72" />
<title>Prototipo · Producción [1004] · Modo visual</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --brand:#642a72; --brand-d:#4a1f54;
    --cream:#faf6f0; --card:#fff; --ink:#2a2320; --ink-soft:#6f655d; --line:#ece4da;
    --ok:#2e9e6b; --danger:#d4503e;
    --r:18px;
    --shadow:0 1px 0 rgba(42,35,32,.04), 0 10px 26px -18px rgba(42,35,32,.3);
    --bar:96px;            /* alto barra inferior móvil */
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--cream);color:var(--ink);
    -webkit-tap-highlight-color:transparent;overflow:hidden}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  :focus-visible{outline:3px solid var(--brand);outline-offset:2px}
  .num{font-variant-numeric:tabular-nums}

  .app{height:100dvh;display:flex;flex-direction:column;overflow:hidden}
  .demo{background:#fff7e6;color:#8a6d1f;font-size:12px;font-weight:600;text-align:center;
    padding:4px 12px;border-bottom:1px solid #f0e2bd;flex:none}

  /* Header */
  header{background:var(--brand);color:#fff;padding:9px 14px;display:flex;align-items:center;gap:12px;flex:none}
  .logo{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.16);display:grid;place-items:center;font-weight:900;font-size:18px;flex:none}
  .bt b{display:block;font-weight:800;font-size:15px;line-height:1.05}
  .bt span{font-size:10.5px;opacity:.8;text-transform:uppercase;letter-spacing:1.4px}
  header .sp{flex:1}
  .conn{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;opacity:.92;white-space:nowrap}
  .dot{width:9px;height:9px;border-radius:50%;background:#7CFFB2;box-shadow:0 0 0 3px rgba(124,255,178,.25)}
  .op{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.14);border-radius:999px;padding:5px 6px 5px 13px;font-weight:600;font-size:13.5px;white-space:nowrap}
  .op .av{width:28px;height:28px;border-radius:50%;background:#fff;color:var(--brand);display:grid;place-items:center;font-weight:800;font-size:13px}
  .op.out{background:var(--ok)}
  .op.out .av{background:rgba(255,255,255,.25);color:#fff}
  @media(max-width:430px){ .conn span.lbl{display:none} }

  /* Cuerpo */
  .body{flex:1;display:grid;grid-template-columns:1fr;min-height:0;overflow:hidden}
  @media(min-width:860px){ .body{grid-template-columns:1fr minmax(320px,380px)} }

  .main{min-height:0;display:flex;flex-direction:column;overflow:hidden}
  .filters{padding:10px 14px 2px;flex:none}
  .search{position:relative}
  .search input{width:100%;height:50px;border:2px solid var(--line);border-radius:14px;background:#fff;
    padding:0 14px 0 44px;font-size:16px;font-weight:500;color:var(--ink)}
  .search input::placeholder{color:#b3a99f}
  .search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%)}
  .chips{display:flex;gap:8px;overflow-x:auto;padding:8px 14px 10px;flex:none;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:none;height:40px;padding:0 16px;border-radius:999px;background:#fff;border:2px solid var(--line);
    font-weight:700;font-size:14px;color:var(--ink-soft);white-space:nowrap;transition:.12s}
  .chip[aria-pressed="true"]{background:var(--ink);color:#fff;border-color:var(--ink)}

  .gridwrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:2px 14px 18px}
  .body.mobile .gridwrap{padding-bottom:calc(var(--bar) + env(safe-area-inset-bottom) + 14px)}
  .eyebrow{font-size:11.5px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-soft);margin:12px 4px 9px}
  .grid{display:grid;gap:11px;grid-template-columns:repeat(2,1fr)}
  @media(min-width:520px){.grid{grid-template-columns:repeat(3,1fr)}}
  @media(min-width:860px){.grid{grid-template-columns:repeat(2,1fr)}}
  @media(min-width:1040px){.grid{grid-template-columns:repeat(3,1fr)}}
  @media(min-width:1320px){.grid{grid-template-columns:repeat(4,1fr)}}

  .tile{position:relative;border-radius:var(--r);border:1.5px solid var(--line);background:var(--tc,#fff);
    padding:12px 10px;min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:6px;text-align:center;transition:transform .08s;user-select:none;box-shadow:var(--shadow)}
  .tile:active{transform:scale(.95)}
  .tile.bump{animation:bump .32s ease}
  @keyframes bump{0%{transform:scale(1)}35%{transform:scale(1.06)}100%{transform:scale(1)}}
  .tile .em{font-size:42px;line-height:1;filter:drop-shadow(0 3px 4px rgba(0,0,0,.12))}
  .tile .nm{font-weight:700;font-size:14px;line-height:1.12;color:var(--ink)}
  .tile .sku{font-size:10.5px;color:var(--ink-soft);font-weight:600}
  .tile .badge{position:absolute;top:-9px;right:-9px;min-width:34px;height:34px;padding:0 8px;border-radius:999px;
    background:var(--brand);color:#fff;font-weight:800;font-size:16px;display:grid;place-items:center;
    box-shadow:0 4px 10px -2px rgba(100,42,114,.5);transform:scale(0);transition:transform .15s cubic-bezier(.2,1.4,.4,1)}
  .tile.has .badge{transform:scale(1)}
  .tile.lock{opacity:.5}
  .tile .nr{position:absolute;top:8px;left:8px;font-size:9.5px;font-weight:800;color:#b3a99f;background:#fff;border:1px solid var(--line);border-radius:6px;padding:2px 5px}
  .empty{padding:36px 14px;text-align:center;color:var(--ink-soft);font-weight:600}

  /* Resumen (rail tablet / hoja móvil) */
  .summary{background:var(--card);border-left:1px solid var(--line);display:flex;flex-direction:column;min-height:0;overflow:hidden}
  .grab{display:none}
  .shead{padding:16px 18px 8px;flex:none}
  .shead .eyebrow{margin:0 0 4px}
  .crow{display:flex;align-items:baseline;gap:12px}
  .count{font-size:60px;font-weight:900;line-height:.9;color:var(--brand)}
  .count.pulse{animation:pulse .3s ease}
  @keyframes pulse{0%{transform:scale(1)}40%{transform:scale(1.12);color:var(--ok)}100%{transform:scale(1)}}
  .clbl{font-weight:700;font-size:14px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.5px;line-height:1.1}
  .slist{flex:1;overflow-y:auto;padding:4px 12px 8px;min-height:0}
  .li{display:flex;align-items:center;gap:9px;padding:8px 6px}
  .li+.li{border-top:1px solid var(--line)}
  .li .lem{font-size:24px;flex:none}
  .li .lnm{flex:1;min-width:0}
  .li .lnm b{display:block;font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .li .lnm small{color:var(--ink-soft);font-weight:600;font-size:11.5px}
  .stp{display:flex;align-items:center;gap:5px;flex:none}
  .stp button{width:42px;height:42px;border-radius:11px;background:var(--cream);border:1.5px solid var(--line);font-size:22px;font-weight:800;display:grid;place-items:center;line-height:1}
  .stp button:active{transform:scale(.9)}
  .stp .q{min-width:30px;text-align:center;font-weight:800;font-size:17px}
  .li .del{width:40px;height:40px;border-radius:11px;color:var(--danger);font-size:17px;display:grid;place-items:center;background:#fbeeec;flex:none}
  .liempty{padding:30px 14px;text-align:center;color:var(--ink-soft);font-weight:600;line-height:1.5}
  .liempty .big{font-size:32px;display:block;margin-bottom:6px}
  .sfoot{padding:12px 16px;flex:none;border-top:1px solid var(--line);background:#fff}
  .btn-prim{width:100%;height:66px;border-radius:15px;background:var(--brand);color:#fff;font-weight:800;font-size:18px;
    display:flex;align-items:center;justify-content:center;gap:9px;box-shadow:0 10px 24px -12px rgba(100,42,114,.7)}
  .btn-prim:active{transform:translateY(1px)}
  .btn-prim:disabled{background:#d8cfc6;box-shadow:none}
  .btn-ghost{width:100%;height:44px;margin-top:8px;border-radius:12px;font-weight:700;font-size:14px;color:var(--ink-soft);border:1.5px solid var(--line);background:#fff}

  /* MÓVIL: barra inferior + hoja */
  .actionbar{display:none}
  .body.mobile .summary{
    position:fixed;left:0;right:0;bottom:0;z-index:50;border-left:none;border-radius:22px 22px 0 0;
    box-shadow:0 -16px 40px -20px rgba(42,35,32,.5);transform:translateY(101%);transition:transform .28s ease;
    max-height:86dvh;padding-bottom:env(safe-area-inset-bottom)}
  .body.mobile .summary.open{transform:translateY(0)}
  .body.mobile .grab{display:block;height:5px;width:46px;border-radius:99px;background:var(--line);margin:9px auto 2px}
  .scrim{position:fixed;inset:0;background:rgba(42,35,32,.5);z-index:49;opacity:0;pointer-events:none;transition:.25s}
  .scrim.show{opacity:1;pointer-events:auto}
  .actionbar{
    position:fixed;left:0;right:0;bottom:0;z-index:45;background:#fff;border-top:1px solid var(--line);
    height:calc(var(--bar) + env(safe-area-inset-bottom));padding:10px 12px calc(10px + env(safe-area-inset-bottom));
    display:flex;align-items:center;gap:12px;box-shadow:0 -8px 24px -18px rgba(42,35,32,.4)}
  .body:not(.mobile) .actionbar{display:none}
  .ab-count{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:74px;
    background:var(--cream);border:1.5px solid var(--line);border-radius:14px;height:100%;padding:0 8px}
  .ab-count b{font-size:30px;font-weight:900;color:var(--brand);line-height:1}
  .ab-count small{font-size:9.5px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.5px}
  .ab-go{flex:1;height:100%;border-radius:15px;background:var(--brand);color:#fff;font-weight:800;font-size:17px;
    display:flex;align-items:center;justify-content:center;gap:8px}
  .ab-go:disabled{background:#d8cfc6}
  .ab-go:active{transform:translateY(1px)}
  .ab-view{font-size:11px;opacity:.85;font-weight:700;display:block}

  /* Login PIN */
  .ov{position:fixed;inset:0;z-index:60;background:rgba(42,35,32,.55);display:none;place-items:center;padding:18px}
  .ov.show{display:grid}
  .modal{background:#fff;border-radius:24px;width:100%;max-width:380px;padding:24px;text-align:center}
  .modal h2{margin:2px 0 2px;font-size:21px;font-weight:800}
  .modal p{margin:0 0 14px;color:var(--ink-soft);font-weight:500;font-size:14px}
  .pind{font-size:32px;font-weight:800;letter-spacing:9px;height:42px;color:var(--brand);margin-bottom:6px}
  .pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .pad button{height:64px;border-radius:15px;background:var(--cream);border:1.5px solid var(--line);font-size:24px;font-weight:800}
  .pad button:active{transform:scale(.94)}
  .pad .w{font-size:17px;color:var(--ink-soft)}
  .modal .h{margin-top:13px;font-size:12.5px;color:var(--ink-soft)}

  /* Enviado */
  .done{position:fixed;inset:0;z-index:70;background:rgba(46,158,107,.97);color:#fff;display:none;
    flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center;padding:24px}
  .done.show{display:flex;animation:fade .25s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .done .ck{width:112px;height:112px;border-radius:50%;background:rgba(255,255,255,.18);display:grid;place-items:center;font-size:60px;animation:pop .4s cubic-bezier(.2,1.5,.4,1)}
  @keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}
  .done h2{font-size:28px;font-weight:900;margin:4px 0 0}
  .done p{font-size:17px;font-weight:600;opacity:.95;margin:0}
  .floater{position:fixed;z-index:55;font-weight:900;font-size:28px;color:var(--brand);pointer-events:none;animation:fly .7s ease forwards}
  @keyframes fly{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-64px) scale(1.4)}}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="app">
  <div class="demo">Prototipo para pruebas · datos de ejemplo · sin conexión real</div>
  <header>
    <div class="logo">J</div>
    <div class="bt"><b>JOSEPAN 360</b><span>Producción · 1004</span></div>
    <div class="sp"></div>
    <div class="conn"><span class="dot"></span><span class="lbl">Planta San Blas</span></div>
    <button class="op out" id="opBtn"><span>Iniciar turno</span><span class="av">+</span></button>
  </header>

  <div class="body" id="body">
    <section class="main">
      <div class="filters">
        <div class="search">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#b3a99f" stroke-width="2.5"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
          <input id="search" type="text" inputmode="search" placeholder="Buscar producto…" autocomplete="off">
        </div>
      </div>
      <div class="chips" id="chips"></div>
      <div class="gridwrap" id="gridwrap"></div>
    </section>

    <aside class="summary" id="summary">
      <div class="grab" id="grab"></div>
      <div class="shead">
        <div class="eyebrow">Lote actual</div>
        <div class="crow"><div class="count num" id="count">0</div><div class="clbl">unidades<br>listas</div></div>
      </div>
      <div class="slist" id="list"></div>
      <div class="sfoot">
        <button class="btn-prim" id="finish" disabled>Terminar lote y enviar a bodega
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button>
        <button class="btn-ghost" id="clear">Vaciar lote</button>
      </div>
    </aside>
  </div>

  <!-- barra inferior (móvil) -->
  <div class="actionbar" id="abar">
    <div class="ab-count"><b class="num" id="mcount">0</b><small>uds</small></div>
    <button class="ab-go" id="mview" disabled><span><span class="ab-view">Ver lote ▲</span>Terminar lote</span></button>
  </div>
</div>

<div class="scrim" id="scrim"></div>

<div class="ov" id="ov">
  <div class="modal">
    <h2>Tu PIN de operario</h2>
    <p>Introduce tu PIN para empezar el turno</p>
    <div class="pind" id="pind"></div>
    <div class="pad" id="pad"></div>
    <div class="h">Demo: cualquier PIN de 4 dígitos entra como “Marta R.”</div>
  </div>
</div>

<div class="done" id="done"><div class="ck">✓</div><h2>Lote enviado a bodega</h2><p id="doneTxt"></p></div>

<script>
(function(){
  var $=function(s){return document.querySelector(s)};
  var CATS={pan:{label:'Panes',em:'🍞',col:'#fbf0df'},bolleria:{label:'Bollería',em:'🥐',col:'#fdeede'},
    salado:{label:'Salados',em:'🥟',col:'#fbe6e3'},tarta:{label:'Tartas',em:'🥧',col:'#f3ecfa'}};
  var P=[
    {id:1,n:'Empanadilla Carne',c:'salado',em:'🥟',fav:1},{id:2,n:'Croissant Cereales',c:'bolleria',em:'🥐',fav:1},
    {id:3,n:'Pan Payés 500g',c:'pan',em:'🍞',fav:1},{id:4,n:'Pan Barra Normal',c:'pan',em:'🥖',fav:1},
    {id:5,n:'Mini Palmeras',c:'bolleria',em:'🥨',fav:1},{id:6,n:'Tarta de Manzana',c:'tarta',em:'🥧'},
    {id:7,n:'Pan de Cereales',c:'pan',em:'🍞'},{id:8,n:'Bollos de Aceite',c:'bolleria',em:'🥯'},
    {id:9,n:'Pan de Molde',c:'pan',em:'🍞',fav:1},{id:10,n:'Magdalenas',c:'bolleria',em:'🧁'},
    {id:11,n:'Baguette Rústica',c:'pan',em:'🥖'},{id:12,n:'Empanada Atún',c:'salado',em:'🥟'},
    {id:13,n:'Donut Azúcar',c:'bolleria',em:'🍩'},{id:14,n:'Tarta Santiago',c:'tarta',em:'🥧'},
    {id:15,n:'Pan Integral',c:'pan',em:'🍞'},{id:16,n:'Ensaimada',c:'bolleria',em:'🥐'},
    {id:17,n:'Croissant Mantequilla',c:'bolleria',em:'🥐',fav:1},{id:18,n:'Rosca de Reyes',c:'tarta',em:'🥨',nr:1},
    {id:19,n:'Pan de Pueblo',c:'pan',em:'🍞'},{id:20,n:'Lionesas Crema',c:'bolleria',em:'🧁'}
  ];
  var batch={},filter='fav',query='',operator=null;
  var MOBILE=function(){return window.matchMedia('(max-width:859px)').matches};
  function syncMode(){ $('#body').classList.toggle('mobile', MOBILE()); }

  function chips(){
    var box=$('#chips');box.innerHTML='';
    var items=[['fav','⭐ Más usados'],['all','Todos']];
    Object.keys(CATS).forEach(function(k){items.push([k,CATS[k].em+' '+CATS[k].label])});
    items.forEach(function(it){var b=document.createElement('button');b.className='chip';
      b.setAttribute('aria-pressed',filter===it[0]);b.textContent=it[1];
      b.onclick=function(){filter=it[0];query='';$('#search').value='';chips();grid()};box.appendChild(b)});
  }
  function visible(){var l=P.slice();if(query){var q=query.toLowerCase();return l.filter(function(p){return p.n.toLowerCase().indexOf(q)>=0})}
    if(filter==='fav')return l.filter(function(p){return p.fav});if(filter==='all')return l;return l.filter(function(p){return p.c===filter})}
  function grid(){
    var w=$('#gridwrap');w.innerHTML='';
    if(!query){var eb=document.createElement('div');eb.className='eyebrow';
      eb.textContent=filter==='fav'?'Más usados en esta planta':(filter==='all'?'Todos los productos':CATS[filter].label);w.appendChild(eb)}
    var vis=visible();
    if(!vis.length){var e=document.createElement('div');e.className='empty';e.textContent='Sin productos para “'+query+'”.';w.appendChild(e);return}
    var g=document.createElement('div');g.className='grid';
    vis.forEach(function(p){var qty=batch[p.id]||0;var t=document.createElement('button');
      t.className='tile'+(qty?' has':'')+(p.nr?' lock':'');t.style.setProperty('--tc',CATS[p.c].col);
      t.innerHTML='<span class="em">'+p.em+'</span><span class="nm">'+p.n+'</span>'+
        (p.nr?'<span class="nr">SIN RECETA</span>':'<span class="sku">PT-'+String(p.id).padStart(4,'0')+'</span>')+
        '<span class="badge num">'+qty+'</span>';
      t.onclick=function(ev){if(p.nr){shake(t);return}add(p.id,ev,t)};g.appendChild(t)});
    w.appendChild(g);
  }
  function shake(t){t.animate&&t.animate([{transform:'translateX(0)'},{transform:'translateX(-6px)'},{transform:'translateX(6px)'},{transform:'translateX(0)'}],{duration:220})}
  function add(id,ev,tile){if(!operator){openLogin();return}batch[id]=(batch[id]||0)+1;
    if(tile){tile.classList.remove('bump');void tile.offsetWidth;tile.classList.add('bump','has');tile.querySelector('.badge').textContent=batch[id]}
    floatPlus(ev);list();pulse()}
  function setQty(id,q){if(q<=0)delete batch[id];else batch[id]=q;grid();list()}
  function total(){return Object.keys(batch).reduce(function(a,k){return a+batch[k]},0)}
  function lines(){return Object.keys(batch).map(function(k){return{p:P.find(function(x){return x.id==k}),q:batch[k]}})}
  function list(){
    var L=lines(),box=$('#list'),t=total();
    $('#count').textContent=t;$('#mcount').textContent=t;
    $('#finish').disabled=!L.length;$('#mview').disabled=!L.length;
    if(!L.length){box.innerHTML='<div class="liempty"><span class="big">👋</span>Toca un producto para empezar a contar el lote.</div>';return}
    box.innerHTML='';
    L.forEach(function(it){var row=document.createElement('div');row.className='li';
      row.innerHTML='<span class="lem">'+it.p.em+'</span><span class="lnm"><b>'+it.p.n+'</b><small>'+it.q+' ud</small></span>'+
        '<span class="stp"><button data-a="m">−</button><span class="q num">'+it.q+'</span><button data-a="p">+</button></span><button class="del">🗑</button>';
      row.querySelector('[data-a="m"]').onclick=function(){setQty(it.p.id,it.q-1)};
      row.querySelector('[data-a="p"]').onclick=function(){setQty(it.p.id,it.q+1);pulse()};
      row.querySelector('.del').onclick=function(){setQty(it.p.id,0)};box.appendChild(row)})}
  function pulse(){var c=$('#count');c.classList.remove('pulse');void c.offsetWidth;c.classList.add('pulse')}
  function floatPlus(ev){if(!ev)return;var f=document.createElement('div');f.className='floater';f.textContent='+1';
    f.style.left=(ev.clientX-10)+'px';f.style.top=(ev.clientY-28)+'px';document.body.appendChild(f);setTimeout(function(){f.remove()},700)}

  function openSheet(){$('#summary').classList.add('open');$('#scrim').classList.add('show')}
  function closeSheet(){$('#summary').classList.remove('open');$('#scrim').classList.remove('show')}
  $('#grab').onclick=closeSheet;$('#scrim').onclick=closeSheet;
  // En móvil el botón inferior: si el lote está sin revisar abre la hoja; doble función → terminar directo si ya abierta
  $('#mview').onclick=function(){ if($('#summary').classList.contains('open')) finish(); else openSheet(); };

  function finish(){var u=total(),n=lines().length;if(!u)return;
    $('#doneTxt').textContent=u+' unidades · '+n+' producto'+(n>1?'s':'');
    $('#done').classList.add('show');closeSheet();
    setTimeout(function(){$('#done').classList.remove('show');batch={};grid();list()},1700)}
  $('#finish').onclick=finish;
  $('#clear').onclick=function(){if(!total())return;batch={};grid();list()};

  var pin='';
  function openLogin(){pin='';$('#pind').textContent='';$('#ov').classList.add('show')}
  function pad(){var p=$('#pad');p.innerHTML='';['1','2','3','4','5','6','7','8','9','C','0','OK'].forEach(function(k){
    var b=document.createElement('button');b.textContent=k;if(k==='C'||k==='OK')b.className='w';
    b.onclick=function(){if(k==='C')pin=pin.slice(0,-1);else if(k==='OK'){if(pin.length>=4)login();return}
      else if(pin.length<4)pin+=k;$('#pind').textContent=pin.replace(/./g,'•');if(pin.length===4)setTimeout(login,160)};
    p.appendChild(b)})}
  function login(){operator={name:'Marta R.',i:'M'};var b=$('#opBtn');b.className='op';
    b.innerHTML='<span>'+operator.name+'</span><span class="av">'+operator.i+'</span>';$('#ov').classList.remove('show')}
  $('#opBtn').onclick=function(){if(operator){operator=null;var b=$('#opBtn');b.className='op out';
    b.innerHTML='<span>Iniciar turno</span><span class="av">+</span>'}else openLogin()};

  $('#search').oninput=function(){query=this.value.trim();if(query)filter='all';chips();grid()};
  window.addEventListener('resize',function(){syncMode();if(!MOBILE())closeSheet()});

  syncMode();chips();pad();grid();list();
})();
</script>
</body>
</html>
